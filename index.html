<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>المنصة التعليمية المتكاملة 4U</title>

    <!-- Favicon configuration -->
    <link rel="icon" type="image/svg+xml" href="/4U/favicon.svg" />
    <link rel="icon" type="image/png" href="/4U/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/4U/favicon.ico" />
    <link rel="apple-touch-icon" href="/4U/favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/4U/manifest.json" />

    <meta name="theme-color" content="#0A0B0D" />

    <!-- Inline script to capture PWA installation prompt immediately -->
    <script>
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;

        if (window.onBeforeInstallPrompt) {
          window.onBeforeInstallPrompt(e);
        }
      });

      // Register Service Worker for PWA compliance
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/4U/sw.js')
            .then((reg) => {
              console.log(
                'ServiceWorker registered successfully:',
                reg.scope
              );
            })
            .catch((err) => {
              console.error(
                'ServiceWorker registration failed:',
                err
              );
            });
        });
      }
    </script>

  </head>

  <body>
    <div id="root"></div>

    <!-- Vite entry point (لا يتم تغيير هذا المسار) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
